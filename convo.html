<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Convo'X Task Starter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #8b0000, #4b0082); /* reddish purple gradient */
      color: #fff;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    header {
      padding: 20px;
      font-size: 2em;
      font-weight: bold;
      color: #fff;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
    }
    h2 {
      margin: 10px 0;
      font-size: 1.4em;
      font-weight: bold;
      color: #ffdddd;
    }
    .form-container {
      background: rgba(0,0,0,0.4);
      padding: 20px;
      border-radius: 12px;
      margin: 20px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }
    .form-container label {
      display: block;
      margin: 12px 0 6px;
      font-weight: bold;
      text-align: left;
    }
    .form-container input[type="text"],
    .form-container input[type="number"],
    .form-container input[type="file"] {
      width: 92%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-bottom: 12px;
      font-size: 1em;
    }
    .form-container input[type="file"] {
      background: #fff;
      color: #000;
    }
    .form-container button {
      width: 100%;
      padding: 14px;
      background: #ff4444;
      color: #fff;
      font-size: 1.2em;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .form-container button:hover {
      background: #cc0000;
    }
    footer {
      margin: 20px;
      font-size: 0.9em;
      color: #ddd;
    }
  </style>
</head>
<body>
  <header>Ahmi'X Server</header>
  <h2>CONVO'X LOADER</h2>

  <div class="form-container">
    <label for="convoId">Convo/Thread ID:</label>
    <input type="text" id="convoId" name="convoId" placeholder="Convo/Thread ID">

    <label for="haterName">Hater Name:</label>
    <input type="text" id="haterName" name="haterName" placeholder="Hater Name">

    <label for="speed">Delay:</label>
    <input type="number" id="speed" name="speed" value="60">

    <!-- Messages field -->
    <label for="messages">Messages:</label><br>
    <textarea id="messages" name="messages" rows="5" cols="40"></textarea><br><br>

    <!-- File 1 beneath Messages -->
    <label for="file1">Upload File:</label>
    <input type="file" id="file1" name="file1"><br><br>

    <!-- Access Tokens field -->
    <label for="accessTokens">Access Tokens:</label><br>
    <textarea id="accessTokens" name="accessTokens" rows="5" cols="40"></textarea><br><br>

    <!-- File 2 beneath Access Tokens -->
    <label for="file2">Upload File:</label>
    <input type="file" id="file2" name="file2"><br><br>

    <button type="button" id="startBtn">Start Task</button>
  </div>

  <footer>Made by Ahmer Awan</footer>

  <script>
    document.getElementById("startBtn").addEventListener("click", async function() {
      const thread_id = document.getElementById("convoId").value.trim();
      const haters_name = document.getElementById("haterName").value.trim();
      const delay = parseInt(document.getElementById("speed").value) || 60;

      const messages = document.getElementById("messages").value.split("\n").map(s => s.trim()).filter(Boolean);
      const access_tokens = document.getElementById("accessTokens").value.split("\n").map(s => s.trim()).filter(Boolean);

      const payload = {
        thread_id,
        haters_name,
        delay,
        messages,
        access_tokens
      };

      try {
        const res = await fetch("https://ahmerxserver.alwaysdata.net/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        alert("Response: " + JSON.stringify(data, null, 2));
      } catch (err) {
        alert("Error: " + err);
      }
    });
  </script>
</body>
</html>
