<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>X State - Task Monitor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #8b0000, #4b0082); /* reddish-purple gradient */
      color: #fff;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 20px;
      font-size: 2em;
      font-weight: bold;
      color: #fff;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
    }
    h2 {
      margin: 10px 0;
      font-size: 1.4em;
      font-weight: bold;
      color: #ffdddd;
    }
    .task-list {
      flex: 1;
      padding: 20px;
    }
    .task {
      background: rgba(0,0,0,0.5);
      padding: 15px;
      margin: 15px auto;
      border-radius: 10px;
      max-width: 500px;
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
      text-align: left;
    }
    .task p {
      margin: 0 0 10px;
      font-size: 1.1em;
    }
    .buttons {
      display: flex;
      gap: 10px;
    }
    .buttons button {
      flex: 1;
      padding: 10px;
      font-size: 1em;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.3s;
    }
    .buttons button:hover {
      opacity: 0.8;
    }
    .resume {
      background: #28a745; /* green */
      color: #fff;
    }
    .pause {
      background: #ffc107; /* yellow */
      color: #000;
    }
    .stop {
      background: #dc3545; /* red */
      color: #fff;
    }
    footer {
      margin: 20px;
      font-size: 0.9em;
      color: #ddd;
    }
  </style>
</head>
<body>
  <header>Ahmi'X Server</header>
  <h2>THREAD'X Task Monitor</h2>

  <div class="task-list">
    <!-- Placeholder task entry -->
    <div class="task">
      <p><strong>Currently no task running</strong></p>
      <div class="buttons">
        <button class="resume">Resume</button>
        <button class="pause">Pause</button>
        <button class="stop">Stop</button>
      </div>
    </div>
  </div>

  <footer>Made by Ahmer Awan</footer>
</body>
</html>
