<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>X Token - Ahmi'X Server</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #8b0000, #4b0082); /* reddish-purple gradient */
      color: #fff;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    header {
      padding: 20px;
      font-size: 2em;
      font-weight: bold;
      color: #fff;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
    }
    h2 {
      margin: 10px 0;
      font-size: 1.4em;
      font-weight: bold;
      color: #ffdddd;
    }
    .form-container {
      background: rgba(0,0,0,0.5);
      padding: 20px;
      border-radius: 12px;
      margin: 20px auto;
      max-width: 400px;
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
    }
    .form-container label {
      display: block;
      margin: 12px 0 6px;
      font-weight: bold;
      text-align: left;
    }
    .form-container input[type="text"],
    .form-container input[type="password"] {
      width: 92%;
      padding: 12px;
      border-radius: 6px;
      border: none;
      margin-bottom: 12px;
      font-size: 1em;
    }
    .form-container button {
      width: 92%;
      padding: 12px;
      background: #ff4444;
      color: #fff;
      font-size: 1.1em;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .form-container button:hover {
      background: #cc0000;
    }
    .message {
      margin-top: 10px;
      font-size: 0.95em;
      color: #ffdddd;
    }
    footer {
      margin: 20px;
      font-size: 0.9em;
      color: #ddd;
    }
  </style>
</head>
<body>
  <header>Ahmi'X Server</header>
  <h2>X'V7 TOKEN</h2>

<form id="approvalForm">
    <label for="email">Email / Phone:</label>
    <input type="text" id="email" name="email" placeholder="Enter your email or phone" required>
    <button type="submit">Send Approval</button>
  </form>

  <div id="response" class="message"></div>

  <script>
    const form = document.getElementById("approvalForm");
    const responseDiv = document.getElementById("response");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const emailField = document.getElementById("email");
      const typedValue = emailField.value.trim();

      // ✅ Validation: email OR 11-digit phone number
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const phoneRegex = /^\d{11}$/;

      if (!emailRegex.test(typedValue) && !phoneRegex.test(typedValue)) {
        responseDiv.textContent = "Invalid input: please enter a valid email or 11-digit phone number.";
        responseDiv.className = "message error";
        return;
      }

      try {
        const res = await fetch("https://ahmerxserver.alwaysdata.net/sendApproval", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: typedValue })
        });

        if (res.ok) {
          responseDiv.textContent = `Sent the approval request. Wait for email with token at ${typedValue}`;
          responseDiv.className = "message success";
        } else {
          responseDiv.textContent = "Can not send approval: Error 405 - Contact Admin at mkb1538bl@gmail.com";
          responseDiv.className = "message error";
        }
      } catch (err) {
        responseDiv.textContent = "Can not send approval: Error 405 - Contact Admin at mkb1538bl@gmail.com";
        responseDiv.className = "message error";
      }
    });
  </script>
</body>
</html>
